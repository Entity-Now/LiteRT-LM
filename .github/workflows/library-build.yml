name: Build and Release LiteRT-LM Cross-Platform Shared Libraries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            output-name: litert_lm_windows.zip
          - os: macos-13
            platform: macos-x86_64
            output-name: litert_lm_macos_x86_64.zip
          - os: macos-latest
            platform: macos-arm64
            output-name: litert_lm_macos_arm64.zip

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Bazel (Bazelisk)
        uses: bazelbuild/setup-bazelisk@v3

      - name: Set up MSVC (Windows only)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      # ==================== 核心编译 ====================
      - name: Compile Library with Bazel
        run: |
          bazel build //litert_c_api:litert_lm \
            --compilation_mode=opt \
            --symlink_prefix=build_output_ \
            --verbose_failures
        shell: bash

      # ==================== Windows 打包 ====================
      - name: Package Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist_bin

          $bazelBin = (bazel info bazel-bin).Trim()
          Write-Host "Bazel bin path: $bazelBin"

          $dllPath = Join-Path $bazelBin "litert_c_api\litert_lm.dll"
          $libPath = Join-Path $bazelBin "litert_c_api\litert_lm.lib"

          if (-not (Test-Path $dllPath)) {
              Write-Error "DLL not found at $dllPath"
              exit 1
          }

          Copy-Item -Path $dllPath -Destination "dist_bin\litert_lm.dll" -Force
          if (Test-Path $libPath) {
              Copy-Item -Path $libPath -Destination "dist_bin\litert_lm.lib" -Force
          }
          Copy-Item -Path "c\engine.h" -Destination "dist_bin\litert_lm_engine.h" -Force

          tar -a -c -f ${{ matrix.output-name }} dist_bin
          Write-Host "Windows package created: ${{ matrix.output-name }}"

      # ==================== macOS 打包 ====================
      - name: Package Artifacts (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          mkdir -p dist_bin

          BAZEL_BIN=$(bazel info bazel-bin)
          echo "Bazel bin path: $BAZEL_BIN"

          DYLIB_PATH=$(find "$BAZEL_BIN" -name "liblitert_lm.dylib" | head -n 1)

          if [ -z "$DYLIB_PATH" ]; then
              echo "Error: liblitert_lm.dylib not found"
              exit 1
          fi

          cp "$DYLIB_PATH" dist_bin/liblitert_lm.dylib
          cp c/engine.h dist_bin/litert_lm_engine.h

          zip -r ${{ matrix.output-name }} dist_bin
          echo "macOS package created: ${{ matrix.output-name }}"

      # ==================== 上传 artifact ====================
      - name: Upload Intermediary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output-name }}
          path: ${{ matrix.output-name }}
